name: Publish @stoachain/dalos-crypto to npmjs

# Triggered by pushing a tag matching ts-vX.Y.Z. The tag's version
# must match the version in ts/package.json. Publishing uses the
# NPMPUSHER secret (mirrors the pattern established in
# StoaChain/OuronetCore's publish workflow).
#
# F-INT-002 (audit cycle 2026-05-04, v4.0.1): hardened against two
# real CI race conditions observed during prior releases:
#
#   1. Tag-and-merge race — pushing a commit to main starts ts-ci
#      across Node 20/22/24; pushing a release tag immediately after
#      starts ts-publish on Node 24 only. Pre-fix, ts-publish could
#      finish before ts-ci's Node-20 build, shipping a broken-on-Node-20
#      version. Post-fix, ts-publish runs its OWN Node-20/22/24 matrix
#      `gates` job and the `publish` job has `needs: gates`, so a
#      Node-20-only failure on the tagged SHA blocks publish.
#
#   2. Rapid-fire tag re-push — pre-fix, force-pushing a tag could
#      spawn parallel ts-publish runs that race on `npm publish`
#      (npm rejects the duplicate but CI minutes are wasted and the
#      Release page can end up half-formed). Post-fix, the
#      `concurrency:` block at workflow level serialises runs per
#      tag ref: a second push waits for the first to complete.
#
# `cancel-in-progress: false` is intentional — never cancel a publish
# mid-flight. Half-published packages are worse than a delayed second
# attempt.

on:
  push:
    tags:
      - 'ts-v*.*.*'

# F-INT-002 mitigation: serialise per-tag runs.
concurrency:
  group: ts-publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # F-INT-002 mitigation: re-run the full ts-ci gate matrix on the
  # tagged SHA before allowing publish. Mirrors ts-ci.yml exactly so
  # any test that would fail in CI also fails here. The publish job
  # below has `needs: gates`, so a single matrix-cell failure blocks
  # the npm publish + Release creation entirely.
  gates:
    name: Pre-publish gates (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ts
    strategy:
      fail-fast: false
      matrix:
        node-version: ['20', '22', '24']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: ts/package-lock.json

      - name: Install dependencies
        run: npm ci --no-fund --no-audit

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Check README code blocks
        run: npm run docs:check

  publish:
    name: Build + publish ts/ package to npmjs
    needs: gates
    runs-on: ubuntu-latest
    # Job-level permissions override the workflow-level read-only default.
    # `contents: write` is required for `gh release create` to succeed.
    # The default GITHUB_TOKEN ships with read-only `contents` scope; without
    # this override the Release-creation steps return HTTP 403.
    # Capped by the org/repo "Workflow permissions" setting (Settings →
    # Actions → General → Workflow permissions = "Read and write").
    permissions:
      contents: write
      # `id-token: write` enables npm provenance: the `npm publish --provenance`
      # step (below) signs the package with a SLSA attestation bound to this
      # workflow run's OIDC token. npmjs displays a "Provenance" badge for
      # consumers, and GitHub surfaces the linked package on the repo sidebar
      # when the npmjs `repository` field points back at this repo. Available
      # since npm 9.5; requires this permission at the job level.
      id-token: write
    defaults:
      run:
        working-directory: ts

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: ts/package-lock.json

      - name: Extract package version from tag
        id: tag_version
        run: |
          TAG="${GITHUB_REF#refs/tags/ts-v}"
          echo "tag_version=$TAG" >> "$GITHUB_OUTPUT"
          echo "Tag-derived version: $TAG"

      - name: Verify ts/package.json version matches tag
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${{ steps.tag_version.outputs.tag_version }}"
          echo "package.json version: $PKG_VERSION"
          echo "Tag version:          $TAG_VERSION"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Version mismatch: package.json $PKG_VERSION vs tag $TAG_VERSION"
            exit 1
          fi

      - name: Verify NPMPUSHER secret is configured
        env:
          NPMPUSHER: ${{ secrets.NPMPUSHER }}
        run: |
          if [ -z "$NPMPUSHER" ]; then
            echo "::error::NPMPUSHER secret is not configured on this repository."
            echo "::error::Add it at: https://github.com/StoaChain/DALOS_Crypto/settings/secrets/actions"
            echo "::error::The token must have publish permission for the @stoachain npm scope."
            exit 1
          fi
          echo "NPMPUSHER secret is present (length: ${#NPMPUSHER})"

      - name: Install dependencies
        run: npm ci --no-fund --no-audit

      - name: Build
        # Lint, typecheck, test already covered by the `gates` matrix
        # job (Node 20/22/24). Only build is needed here to produce
        # the artifact that gets published.
        run: npm run build

      - name: Write .npmrc with auth token
        run: |
          cat > .npmrc <<EOF
          //registry.npmjs.org/:_authToken=${{ secrets.NPMPUSHER }}
          @stoachain:registry=https://registry.npmjs.org
          always-auth=true
          EOF

      - name: Publish to npmjs.org
        # `--provenance` requires `id-token: write` (granted at job level above)
        # plus npm 9.5+ (Node 24's bundled npm satisfies). The attestation is
        # generated automatically and uploaded alongside the tarball.
        run: npm publish --access public --provenance

      - name: Verify tarball contents (sanity)
        if: always()
        run: npm pack --dry-run

      - name: Create GitHub Release for the pushed tag
        # The `--repo` flag is INTENTIONALLY OMITTED. The combination
        # `gh release create --notes-from-tag --repo X` stopped being supported
        # on GitHub-hosted runners around 2026-04-30 (gh CLI image update),
        # silently breaking auto-Release creation on every publish. Without
        # `--repo`, gh defaults to the current working directory's repo,
        # which is fine here because we're inside the checkout.
        # Title strips the `ts-` prefix so the Release displays as `v3.1.0`
        # rather than `ts-v3.1.0`, matching the npm package version exactly
        # (the underlying tag retains the prefix for git-side disambiguation
        # against the Go-reference `v*` tags).
        # Fallback: if this step still fails, /bee:pollinate's REST API
        # fallback creates the Release manually after the workflow ends.
        working-directory: ${{ github.workspace }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          TITLE="${TAG#ts-}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release for $TAG already exists — skipping."
          else
            gh release create "$TAG" \
              --title "$TITLE" \
              --notes-from-tag \
              --latest
            echo "Created GitHub Release: tag=$TAG title=$TITLE."
          fi

      - name: Backfill GitHub Releases for prior tags (idempotent)
        # Idempotent backfill — for each prior tag, create a GitHub Release if
        # one does not already exist. Safe to re-run on every publish; subsequent
        # runs silently skip already-Released tags. Annotated tags use their tag
        # message as release notes; lightweight tags produce empty-bodied Release
        # objects. Title strips the `ts-` prefix (same convention as the main
        # release-creation step above).
        # The list below covers every `ts-v*` tag that should have a Release.
        # /bee:pollinate's backfill step (called from main user invocation) is
        # the canonical front-door; this workflow step is a safety net for
        # scenarios where pollinate hasn't run yet.
        # F-INT-004 (audit cycle 2026-05-04, v4.0.1): list updated to
        # include ts-v4.0.0 (which the prior list was missing — backfill
        # silently didn't cover it because the entry wasn't there).
        # F-LOW-018 recurrence (audit cycle 2026-05-04, v4.0.3): added
        # ts-v4.0.1 + ts-v4.0.2 — both shipped between the F-INT-004
        # update and now, so the safety-net loop had drifted again.
        # This loop NEEDS to be appended to on every release; consider
        # converting to dynamic enumeration via `git for-each-ref` so
        # future bumps don't require touching this file (deferred —
        # current static list is reviewable / auditable, dynamic enum
        # would mask backfill scope from a code reader).
        working-directory: ${{ github.workspace }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for PRIOR_TAG in ts-v1.0.0 ts-v1.1.0 ts-v1.2.0 ts-v3.0.0 ts-v3.0.1 ts-v3.0.2 ts-v3.0.3 ts-v3.1.0 ts-v4.0.0 ts-v4.0.1 ts-v4.0.2; do
            PRIOR_TITLE="${PRIOR_TAG#ts-}"
            if gh release view "$PRIOR_TAG" >/dev/null 2>&1; then
              echo "Backfill: $PRIOR_TAG Release already exists — skipping."
            else
              if git rev-parse "$PRIOR_TAG" >/dev/null 2>&1; then
                gh release create "$PRIOR_TAG" \
                  --title "$PRIOR_TITLE" \
                  --notes-from-tag
                echo "Backfilled GitHub Release: tag=$PRIOR_TAG title=$PRIOR_TITLE."
              else
                echo "Backfill: tag $PRIOR_TAG does not exist in repo — skipping."
              fi
            fi
          done
